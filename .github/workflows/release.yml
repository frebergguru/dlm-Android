name: Release

# Build the app and publish a GitHub Release whenever a version tag is pushed,
# e.g.  git tag v0.2 && git push origin v0.2
on:
  push:
    tags:
      - 'v*'

# Needed for softprops/action-gh-release to create the Release.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Keep these in sync with ndkVersion / compileSdk in the *.gradle.kts files.
      NDK_VERSION: "30.0.14904198"
      CMAKE_VERSION: "3.22.1"
      ANDROID_PLATFORM: "platforms;android-37.0"
      BUILD_TOOLS: "build-tools;37.0.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Fail fast (before the slow native build) if the tag doesn't match the
      # versionName declared in app/build.gradle.kts, e.g. tag v0.2 -> "0.2".
      - name: Verify tag matches versionName
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          version="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n1)"
          echo "Tag version:        $tag"
          echo "gradle versionName: $version"
          if [ "$tag" != "$version" ]; then
            echo "::error::Tag v$tag does not match versionName \"$version\" in app/build.gradle.kts"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install SDK packages (platform, build-tools, NDK, CMake)
        run: |
          sdkmanager --install \
            "$ANDROID_PLATFORM" \
            "$BUILD_TOOLS" \
            "ndk;$NDK_VERSION" \
            "cmake;$CMAKE_VERSION"

      - name: Install native build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool make perl

      # Cross-compiling OpenSSL/curl/jansson/pcre2 for three ABIs is slow, so
      # cache the result keyed on the script that produces it + the NDK version.
      - name: Cache cross-compiled native deps
        id: nativedeps
        uses: actions/cache@v6
        with:
          path: nativeDeps
          key: nativedeps-${{ runner.os }}-ndk${{ env.NDK_VERSION }}-${{ hashFiles('scripts/build-deps.sh') }}

      - name: Build native dependencies
        if: steps.nativedeps.outputs.cache-hit != 'true'
        run: |
          export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          scripts/build-deps.sh

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Assemble release APKs
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      # A debug build is debug-signed and therefore always installable, so it is
      # published as a fallback for users (handy when no release keystore is set).
      - name: Assemble debug APK (installable fallback)
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      # Sign the APKs if a keystore is configured via repository secrets;
      # otherwise the (unsigned) APKs Gradle produced are published as-is.
      #
      # To enable signing, add these secrets:
      #   KEYSTORE_BASE64   - base64 of your .jks  (base64 -w0 my.jks)
      #   KEYSTORE_PASSWORD - keystore password
      #   KEY_ALIAS         - key alias
      #   KEY_PASSWORD      - key password
      - name: Prepare release artifacts (sign if keystore present)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p dist
          tools="$(ls -d "$ANDROID_SDK_ROOT"/build-tools/* | sort -V | tail -n1)"
          if [ -n "${KEYSTORE_BASE64:-}" ]; then
            echo "Signing release APKs with the configured keystore."
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            for apk in app/build/outputs/apk/release/*-unsigned.apk; do
              name="$(basename "${apk%-unsigned.apk}").apk"
              "$tools/zipalign" -p -f 4 "$apk" "dist/$name"
              "$tools/apksigner" sign \
                --ks keystore.jks \
                --ks-pass env:KEYSTORE_PASSWORD \
                --ks-key-alias "$KEY_ALIAS" \
                --key-pass env:KEY_PASSWORD \
                "dist/$name"
            done
            rm -f keystore.jks dist/*.idsig
          else
            echo "No keystore secrets set — publishing the unsigned APKs."
            cp app/build/outputs/apk/release/*.apk dist/
          fi
          # Always include the universal debug APK as an installable fallback.
          cp app/build/outputs/apk/debug/app-universal-debug.apk dist/ \
            || cp app/build/outputs/apk/debug/*.apk dist/
          ls -l dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
